<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard Ibiza — Polarier</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--B:#0E4174;--B2:#1a5a9e;--B3:#0a2d54;--Y:#F1BE48;--YD:#7a5100}
body{font-family:'Montserrat',sans-serif;background:#e8eef6;color:#1a2e44;min-height:100vh}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,var(--B3),var(--B))}
.login-card{background:#fff;border-radius:24px;padding:44px 40px;max-width:400px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.25);text-align:center}
.login-logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:24px}
.login-mark{width:40px;height:40px;border-radius:12px;background:var(--B);display:flex;align-items:center;justify-content:center}
.login-mark svg{width:22px;height:22px}
.login-lbl{font-size:11px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--B);opacity:.6}
.login-icon{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--B3),var(--B));margin:0 auto 20px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(14,65,116,.3)}
.login-icon svg{width:30px;height:30px}
.login-title{font-size:22px;font-weight:900;color:var(--B);margin-bottom:6px}
.login-sub{font-size:12px;color:#607080;margin-bottom:28px;line-height:1.6}
.login-input{width:100%;border:1.5px solid #dde8f5;background:#f7fafd;border-radius:12px;padding:13px 18px;font-size:14px;font-family:inherit;color:#1a2e44;outline:none;margin-bottom:14px;text-align:center;letter-spacing:.2em;transition:.2s}
.login-input:focus{border-color:var(--B);background:#fff}
.login-btn{width:100%;background:linear-gradient(135deg,var(--B3),var(--B));color:#fff;border:none;border-radius:12px;padding:14px;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;box-shadow:0 6px 20px rgba(14,65,116,.3);transition:.2s}
.login-btn:hover{transform:translateY(-1px)}
.login-err{font-size:12px;color:#c0392b;margin-top:10px;font-weight:700;display:none}

.shell{max-width:1200px;margin:0 auto;padding:0 20px 80px}
.hero{background:linear-gradient(135deg,var(--B3) 0%,var(--B) 60%,var(--B2) 100%);color:#fff;padding:24px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hero-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(241,190,72,.18);border:1px solid rgba(241,190,72,.28);color:#f5d67a;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:5px 13px;border-radius:999px;margin-bottom:10px}
.bdot{width:5px;height:5px;border-radius:50%;background:var(--Y)}
.hero h1{font-size:20px;font-weight:900;margin-bottom:3px}
.hero p{font-size:11px;opacity:.65}
.hero-actions{display:flex;gap:8px;flex-wrap:wrap}
.hbtn{border:none;border-radius:10px;padding:9px 18px;font-weight:800;cursor:pointer;font-size:12px;font-family:inherit;transition:.2s}
.hbtn-w{background:rgba(255,255,255,.14);color:#fff;border:1.5px solid rgba(255,255,255,.28)}
.hbtn-w:hover{background:rgba(255,255,255,.24)}
.hbtn-y{background:var(--Y);color:var(--YD)}
.hbtn-r{background:#fde8e8;color:#9b1515;border:1px solid #f5b8b8}
.fbar{background:#fff;padding:14px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;border-bottom:1px solid rgba(14,65,116,.07)}
.flbl{font-size:11px;font-weight:800;color:var(--B);text-transform:uppercase;letter-spacing:.06em}
.fsel{border:1.5px solid #dde8f5;background:#f7fafd;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;font-family:inherit;color:var(--B);outline:none;cursor:pointer}
.body{padding:20px 0}
.tabs{display:flex;gap:4px;background:#fff;border-radius:16px;padding:6px;box-shadow:0 2px 12px rgba(14,65,116,.07);border:1px solid rgba(14,65,116,.06);margin-bottom:20px;flex-wrap:wrap}
.tab{padding:10px 18px;border-radius:12px;font-size:12px;font-weight:800;cursor:pointer;color:#607080;border:none;background:transparent;font-family:inherit;transition:.18s}
.tab:hover{background:#f0f6ff;color:var(--B)}
.tab.on{background:linear-gradient(135deg,var(--B3),var(--B));color:#fff;box-shadow:0 4px 12px rgba(14,65,116,.25)}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:#fff;border-radius:18px;padding:18px 16px;box-shadow:0 3px 16px rgba(14,65,116,.07);border:1px solid rgba(14,65,116,.06);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--B3),var(--B))}
.kpi-val{font-size:30px;font-weight:900;color:var(--B);line-height:1;margin-bottom:6px}
.kpi-lbl{font-size:10px;font-weight:700;color:#8090a8;text-transform:uppercase;letter-spacing:.06em}

.global-score{background:linear-gradient(135deg,var(--B3),var(--B));border-radius:20px;padding:24px 28px;margin-bottom:20px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;box-shadow:0 6px 24px rgba(14,65,116,.2)}
.gs-circle{width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.1);border:3px solid var(--Y);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.gs-num{font-size:28px;font-weight:900;line-height:1}
.gs-max{font-size:11px;color:rgba(255,255,255,.5);font-weight:600}
.gs-title{font-size:16px;font-weight:900;color:#fff;margin-bottom:6px}
.gs-sub{font-size:12px;color:rgba(255,255,255,.65);line-height:1.6;max-width:500px}
.gs-chips{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.gs-chip{padding:5px 12px;border-radius:999px;font-size:11px;font-weight:700;background:rgba(255,255,255,.14);color:#fff}

.tech-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.tcard{background:#fff;border-radius:18px;padding:18px;box-shadow:0 3px 16px rgba(14,65,116,.07);border:1px solid rgba(14,65,116,.06);cursor:pointer;transition:.2s}
.tcard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(14,65,116,.12)}
.tcard-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.tav{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--B),var(--B2));color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tcard-name{font-size:14px;font-weight:800;color:var(--B)}
.tcard-role{font-size:10px;color:#8090a8;font-weight:600;margin-top:2px}
.tcard-score{font-size:30px;font-weight:900;line-height:1}
.tcard-score-lbl{font-size:10px;color:#8090a8;font-weight:600;margin-top:3px}
.mini-bar{margin-bottom:7px}
.mini-bar-head{display:flex;justify-content:space-between;margin-bottom:3px}
.mini-bar-lbl{font-size:10px;font-weight:600;color:#607080}
.mini-bar-val{font-size:10px;font-weight:800}
.mini-track{height:5px;background:#eef2f8;border-radius:999px;overflow:hidden}
.mini-fill{height:5px;border-radius:999px}

.card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 3px 16px rgba(14,65,116,.07);border:1px solid rgba(14,65,116,.06);margin-bottom:18px}
.ch{background:linear-gradient(135deg,var(--B3),var(--B));padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.ch-left{display:flex;align-items:center;gap:10px}
.ch-dot{width:7px;height:7px;border-radius:50%;background:var(--Y);flex-shrink:0}
.ch-title{font-size:12px;font-weight:800;color:#fff}
.ch-badge{background:rgba(241,190,72,.22);color:#f5d67a;font-size:10px;font-weight:800;padding:3px 10px;border-radius:999px}
.cb{padding:18px 20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}

.chw{position:relative;width:100%;height:240px}
.chw-lg{position:relative;width:100%;height:300px}

.schip{display:inline-block;padding:4px 11px;border-radius:999px;font-size:11px;font-weight:800;color:#fff}

.tech-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.ttab{padding:8px 14px;border-radius:10px;border:1.5px solid #dde8f5;background:#f7fafd;cursor:pointer;font-size:11px;font-weight:800;color:var(--B);font-family:inherit;transition:.18s}
.ttab:hover{background:#eef4fb}
.ttab.on{background:linear-gradient(135deg,var(--B3),var(--B));color:#fff;border-color:var(--B)}

.hbar-wrap{margin-bottom:12px}
.hbar-head{display:flex;justify-content:space-between;margin-bottom:5px}
.hbar-lbl{font-size:12px;font-weight:700;color:#1a3558}
.hbar-val{font-size:13px;font-weight:900}
.hbar-track{height:10px;background:#eef2f8;border-radius:999px;overflow:hidden}
.hbar-fill{height:10px;border-radius:999px;transition:width .6s cubic-bezier(.4,0,.2,1)}

.dafo-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}
.dafo-col{border-radius:14px;overflow:hidden;border:1px solid rgba(14,65,116,.08)}
.dafo-head{padding:10px 14px;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.dafo-head.f{background:#e8f5e9;color:#2E7D32}
.dafo-head.o{background:#e3f2fd;color:#1565C0}
.dafo-head.d{background:#fde8e8;color:#c62828}
.dafo-body{padding:10px;background:#fafcff;min-height:60px}
.dpill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 10px;font-size:10px;font-weight:700;margin:2px 3px 2px 0}
.dpill.f{background:#e8f5e9;color:#2E7D32}
.dpill.o{background:#e3f2fd;color:#1565C0}
.dpill.d{background:#fde8e8;color:#c62828}
.dpscore{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0}

.vtbl{width:100%;border-collapse:collapse;font-size:12px}
.vtbl th{padding:10px 14px;font-size:10px;font-weight:800;color:var(--B);text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #dde8f5;background:#f7fafd;text-align:center}
.vtbl th:first-child{text-align:left}
.vtbl td{padding:10px 14px;border-bottom:1px solid #eef2f8;vertical-align:middle;text-align:center}
.vtbl tr:last-child td{border-bottom:none}
.vtbl td:first-child{text-align:left;font-weight:700;font-size:13px;color:#1a3558}

.rtbl{width:100%;border-collapse:collapse;font-size:13px}
.rtbl thead tr{background:linear-gradient(90deg,var(--B3),var(--B))}
.rtbl thead th{padding:13px 18px;font-size:11px;font-weight:800;color:#fff;text-align:left;letter-spacing:.05em;text-transform:uppercase}
.rtbl tbody tr:nth-child(odd){background:#fff}
.rtbl tbody tr:nth-child(even){background:#f7fafd}
.rtbl tbody tr:hover td{background:#eef4fb!important}
.rtbl tbody td{padding:13px 18px;border-bottom:1px solid rgba(14,65,116,.05);vertical-align:middle}
.rtbl tbody tr:last-child td{border-bottom:none}
.del-btn{border:none;background:#fde8e8;color:#9b1515;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit}

.empty{padding:50px 20px;text-align:center;color:#8090a8;font-size:13px;font-weight:600}
.empty-title{font-size:18px;font-weight:800;color:var(--B);margin-bottom:8px}
.loading{padding:30px;text-align:center;color:#8090a8;font-size:13px;font-weight:700}

@media print{.hero-actions,.fbar,.tabs,.hbtn{display:none!important}body{background:#fff}.card,.kpi,.tcard,.global-score{box-shadow:none}}
@media(max-width:900px){.kpi-row,.tech-cards{grid-template-columns:1fr 1fr}.g2,.dafo-cols{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="login-wrap" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-mark"><svg viewBox="0 0 22 22" fill="none"><path d="M11 2l2.2 6.5H20l-5.5 4 2 6.5L11 15l-5.5 4 2-6.5L2 8.5h6.8z" stroke="#F1BE48" stroke-width="1.5" stroke-linejoin="round"/></svg></div>
      <span class="login-lbl">Polarier</span>
    </div>
    <div class="login-icon"><svg viewBox="0 0 30 30" fill="none"><path d="M15 5a5 5 0 100 10 5 5 0 000-10zM5 24c0-4.4 4.5-8 10-8s10 3.6 10 8" stroke="#F1BE48" stroke-width="2" stroke-linecap="round"/></svg></div>
    <div class="login-title">Dashboard privado</div>
    <div class="login-sub">Acceso restringido al equipo directivo de Polarier.</div>
    <input class="login-input" type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/>
    <button class="login-btn" onclick="login()">Acceder al dashboard</button>
    <div class="login-err" id="pwd-err">Contraseña incorrecta.</div>
  </div>
</div>

<div id="dash-wrap" style="display:none">
<div class="shell">
  <div class="hero">
    <div>
      <div class="hero-badge"><div class="bdot"></div>Vista privada · Dirección Polarier</div>
      <h1>Dashboard — Puesta en Marcha Ibiza</h1>
      <p>Resultados en tiempo real de todas las evaluaciones recibidas</p>
    </div>
    <div class="hero-actions">
      <button class="hbtn hbtn-w" onclick="init()">↻ Actualizar</button>
      <button class="hbtn hbtn-y" onclick="window.print()">Exportar PDF</button>
      <button class="hbtn hbtn-r" onclick="clearAll()">Borrar todo</button>
    </div>
  </div>
  <div class="fbar">
    <span class="flbl">Filtrar por evaluador:</span>
    <select class="fsel" id="eval-filter" onchange="applyFilter()"><option value="">Todos los evaluadores</option></select>
  </div>
  <div class="body">
    <div class="tabs">
      <button class="tab on" onclick="switchTab('resumen',this)">Resumen ejecutivo</button>
      <button class="tab" onclick="switchTab('tecnico',this)">Detalle por técnico</button>
      <button class="tab" onclick="switchTab('valores',this)">7. Valores Polarier</button>
      <button class="tab" onclick="switchTab('registros',this)">Registros</button>
    </div>
    <div id="dash-content"><div class="loading">Cargando evaluaciones...</div></div>
  </div>
</div>
</div>

<script>
const SB_URL='https://jjlfqpwgjedgswggwtlm.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqbGZxcHdnamVkZ3N3Z2d3dGxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTMxMzUsImV4cCI6MjA5MjI4OTEzNX0.N_iZREfMulT6mg_TEgy4G2qjpfoelxBYNgw_vyjnfAs';
const TABLE='evaluaciones';
const PWD='Polarier2025';

const TECHS=[
  {key:'breidy',name:'Breidy Caamal',init:'BC'},
  {key:'melvin',name:'Melvin Romero',init:'MR'},
  {key:'marcos',name:'Marcos Gómez',init:'MG'},
  {key:'eric',name:'Eric Tejeda',init:'ET'},
  {key:'gaspar',name:'Gaspar López',init:'GL'},
  {key:'jacob',name:'Jacob Tec',init:'JT'}
];
const P4_KEYS=[
  {key:'plan',label:'Planificación y organización'},
  {key:'res',label:'Enfoque a resultados'},
  {key:'resp',label:'Responsabilidad'},
  {key:'impl',label:'Implicación'},
  {key:'team',label:'Trabajo en equipo'},
  {key:'com',label:'Comunicación'}
];
const RECS=['No contaría con él','Sin aprendizaje previo','Como ayudante','Reforzando puntos débiles','Sí, indiscutiblemente'];
const DAFO_ITEMS=["Adaptabilidad","Asertividad","Generación de confianza","Pensamiento estructurado","Orientación al cliente","Transferencia de conocimiento","Resiliencia","Autogestión","Escucha activa","Proactividad","Comunicación","Gestión de presión","Documentación","Organización personal","Autocontrol","Liderazgo situacional","Inteligencia emocional","Negociación"];
const VALUES=["Excelencia","Proactividad","Innovación","Compromiso","Orientación al cliente","Responsabilidad"];
const SC5=['','#D32F2F','#F4511E','#FDD835','#8BC34A','#4CAF50'];
const SC5t=['','#fff','#fff','#5a3800','#2a4a00','#fff'];

let allR=[],filtR=[],charts=[],curTab='resumen';

function login(){
  if(document.getElementById('pwd').value===PWD){
    document.getElementById('login-wrap').style.display='none';
    document.getElementById('dash-wrap').style.display='block';
    init();
  }else{
    document.getElementById('pwd-err').style.display='block';
  }
}

function killCharts(){charts.forEach(c=>{try{c.destroy();}catch(e){}});charts=[];}

function avg(arr){
  const v=arr.filter(x=>typeof x==='number'&&x!==null&&!isNaN(x));
  return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;
}

function fmt(n,d=1){
  return(n===null||n===undefined||isNaN(n))?'—':Number(n).toFixed(d);
}

function toPct(v){
  return v!==null?Math.round(v/5*100):null;
}

function fmtPct(p){
  return p===null?'—':p+'%';
}

function pctColor(p){
  if(p===null)return'#ccc';
  if(p>=80)return'#4CAF50';
  if(p>=60)return'#8BC34A';
  if(p>=40)return'#FDD835';
  if(p>=20)return'#F4511E';
  return'#D32F2F';
}

function sc(v){
  if(v===null||v===undefined)return'#ccc';
  return SC5[Math.min(5,Math.max(1,Math.round(v)))];
}

function sct(v){
  if(v===null||v===undefined)return'#fff';
  return SC5t[Math.min(5,Math.max(1,Math.round(v)))];
}

function chip(v){
  return '<span class="schip" style="background:'+sc(v)+';color:'+sct(v)+'">'+fmt(v)+'</span>';
}

function parseKV(str){
  if(!str)return{};
  const m={};
  str.split('||').forEach(function(p){
    var i=p.indexOf(':');
    if(i>-1){var k=p.slice(0,i);var vv=parseInt(p.slice(i+1));if(!isNaN(vv))m[k]=vv;}
  });
  return m;
}

async function loadData(){
  const res=await fetch(SB_URL+'/rest/v1/'+TABLE+'?select=*&order=created_at.desc',{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  if(!res.ok)throw new Error('Error');
  return res.json();
}

async function deleteRow(id){
  if(!confirm('¿Eliminar este registro?'))return;
  await fetch(SB_URL+'/rest/v1/'+TABLE+'?id=eq.'+id,{
    method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  init();
}

async function clearAll(){
  if(!confirm('¿Borrar TODAS las respuestas?'))return;
  await fetch(SB_URL+'/rest/v1/'+TABLE+'?id=neq.0',{
    method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  init();
}

async function init(){
  document.getElementById('dash-content').innerHTML='<div class="loading">Cargando evaluaciones...</div>';
  killCharts();
  try{allR=await loadData();}
  catch(e){
    document.getElementById('dash-content').innerHTML='<div class="empty"><div class="empty-title">Error de conexión</div>Verifica tu conexión.</div>';
    return;
  }
  if(!allR.length){
    document.getElementById('dash-content').innerHTML='<div class="empty"><div class="empty-title">Sin respuestas todavía</div>Comparte el formulario con los evaluadores.</div>';
    return;
  }
  populateFilter();
  applyFilter();
}

function populateFilter(){
  const sel=document.getElementById('eval-filter');
  const evals=[...new Set(allR.map(function(r){return r.evaluador;}).filter(Boolean))].sort();
  sel.innerHTML='<option value="">Todos los evaluadores</option>';
  evals.forEach(function(e){
    var o=document.createElement('option');o.value=e;o.textContent=e;sel.appendChild(o);
  });
}

function applyFilter(){
  const ev=document.getElementById('eval-filter').value;
  filtR=ev?allR.filter(function(r){return r.evaluador===ev;}):allR;
  renderTab(curTab);
}

function switchTab(tab,btn){
  curTab=tab;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  if(btn)btn.classList.add('on');
  renderTab(tab);
}

function renderTab(tab){
  killCharts();
  if(tab==='resumen')renderResumen();
  else if(tab==='tecnico')renderTecnico();
  else if(tab==='valores')renderValores();
  else renderRegistros();
}

/* ── RESUMEN EJECUTIVO ── */
function renderResumen(){
  var R=filtR;

  // P7 averages
  var p7eq=avg(R.reduce(function(acc,r){return acc.concat(VALUES.map(function(v){var kv=parseKV(r.valores_equipo);return kv[v]!==undefined?kv[v]:null;}));},[]).filter(function(x){return x!==null;}));
  var p7pr=avg(R.reduce(function(acc,r){return acc.concat(VALUES.map(function(v){var kv=parseKV(r.valores_proyecto);return kv[v]!==undefined?kv[v]:null;}));},[]).filter(function(x){return x!==null;}));

function showTech(key,btn){
  document.querySelectorAll('.ttab').forEach(function(b){b.classList.remove('on');});
  if(btn)btn.classList.add('on');
  var R=filtR;
  var t=TECHS.find(function(x){return x.key===key;});
  var p1=avg(R.map(function(r){return r['q1_'+key];}).filter(function(x){return x!==null;}));
  var p2=avg(R.map(function(r){return r['q2_'+key];}).filter(function(x){return x!==null;}));
  var p3=avg(R.map(function(r){return r['q3_'+key];}).filter(function(x){return x!==null;}));
  var rec=avg(R.map(function(r){return r['rec_'+key];}).filter(function(x){return x!==null;}));
  var recR=Math.max(1,Math.round(rec)||1);
  var p4Vals=P4_KEYS.map(function(p){return avg(R.map(function(r){return r['p4_'+p.key+'_'+key];}).filter(function(x){return x!==null;}));});
  var global=avg([p1,p2,p3,rec].concat(p4Vals).filter(function(x){return x!==null;}));

  var dafoParsed={f:[],o:[],d:[]};
  DAFO_ITEMS.forEach(function(item){
    var vals=R.map(function(r){var kv=parseKV(r['dafo_'+key]);return kv[item]!==undefined?kv[item]:null;}).filter(function(x){return x!==null;});
    if(!vals.length)return;
    var av=avg(vals);var r2=Math.round(av);
    if(r2<=2)dafoParsed.d.push({item:item,avg:av});
    else if(r2===3)dafoParsed.o.push({item:item,avg:av});
    else dafoParsed.f.push({item:item,avg:av});
  });

  var rid='r'+Math.random().toString(36).slice(2,6);

  [{l:'1. Desempeño general',v:p1},{l:'2. Enfoque metodológico y comunicación',v:p2},{l:'3. Resolución de problemas',v:p3}].forEach(function(x){
    html+='<div class="hbar-wrap"><div class="hbar-head"><span class="hbar-lbl">'+x.l+'</span><span class="hbar-val" style="color:'+sc(x.v)+'">'+fmt(x.v)+' / 5</span></div><div class="hbar-track"><div class="hbar-fill" style="width:'+(x.v!==null?(x.v/5*100):0)+'%;background:'+sc(x.v)+'"></div></div></div>';

    '</div>'+
    '<div class="card"><div class="ch"><div class="ch-left"><div class="ch-dot"></div><span class="ch-title">7. Tabla comparativa — Equipo vs Proyecto</span></div></div>'+
    '<div class="cb"><table class="vtbl"><thead><tr><th>Valor</th><th>Equipo</th><th>Proyecto</th><th>Diferencia</th></tr></thead><tbody>'+tblRows+'</tbody></table></div></div>'+
    '</div>';

  [{id:rid1,data:eqData,color:'#0E4174'},{id:rid2,data:prData,color:'#F1BE48'}].forEach(function(cfg){
    var c=new Chart(document.getElementById(cfg.id),{
      type:'radar',
      data:{labels:VALUES,datasets:[{data:cfg.data.map(function(v){return v!==null?+v.toFixed(2):0;}),backgroundColor:cfg.color+'22',borderColor:cfg.color,pointBackgroundColor:cfg.data.map(function(v){return sc(v);}),pointBorderColor:'#fff',pointBorderWidth:2,pointRadius:6,borderWidth:2.5}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return ctx.label+': '+ctx.parsed.r.toFixed(1)+' / 5';}}}},scales:{r:{beginAtZero:true,max:5,ticks:{stepSize:1,font:{size:9},backdropColor:'transparent'},pointLabels:{font:{size:12,weight:'700'},color:'#1a2e44'},grid:{color:'rgba(14,65,116,.08)'},angleLines:{color:'rgba(14,65,116,.1)'}}}}
    });
    charts.push(c);
  });
}

/* ── REGISTROS ── */
function renderRegistros(){
  var R=filtR;
  var rows=R.map(function(r){
    return '<tr><td style="font-weight:700">'+( r.evaluador||'—')+'</td><td style="color:#607080">'+(r.fecha||'—')+'</td><td><button class="del-btn" onclick="deleteRow('+r.id+')">Eliminar</button></td></tr>';
  }).join('');
  document.getElementById('dash-content').innerHTML=
    '<div><div class="card">'+
    '<div class="ch"><div class="ch-left"><div class="ch-dot"></div><span class="ch-title">Registros de evaluación</span></div><span class="ch-badge">'+R.length+' registro'+(R.length!==1?'s':'')+'</span></div>'+
    '<div class="cb" style="overflow-x:auto"><table class="rtbl"><thead><tr><th>Evaluador</th><th>Fecha</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>'+
    '</div></div>';
}
</script>
